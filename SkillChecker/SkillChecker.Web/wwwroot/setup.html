<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SkillChecker — Создание пароля</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container auth-container" role="main">
        <h1>SkillChecker</h1>
        <p class="subtitle">Первый запуск — создайте пароль</p>
        <p class="auth-hint">Этот пароль будет защищать панель преподавателя от посторонних. Запомните его — для сброса нужно будет удалить файл <code>SkillCheckerServer/Data/auth.json</code>.</p>
        <div class="auth-form">
            <div class="form-group">
                <label for="setupPassword">Пароль (минимум 4 символа)</label>
                <input type="password" id="setupPassword" autofocus aria-label="Новый пароль">
            </div>
            <div class="form-group">
                <label for="setupPasswordConfirm">Повторите пароль</label>
                <input type="password" id="setupPasswordConfirm" aria-label="Повторите пароль">
            </div>
            <div id="setupError" class="auth-error hidden" role="alert"></div>
            <button class="auth-submit" onclick="doSetup()" aria-label="Создать пароль">Создать пароль</button>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/setup.js"></script>
</body>
</html>
