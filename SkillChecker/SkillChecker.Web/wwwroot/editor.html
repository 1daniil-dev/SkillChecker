<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор теста — SkillChecker</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/editor.css">
</head>
<body>
    <div class="app">
        <div class="top-bar">
            <a href="index.html" class="back-link" aria-label="Вернуться к списку тестов">← Назад</a>
            <h2 id="editorTitle">Редактор теста</h2>
        </div>

        <div id="questionsContainer"></div>

        <button class="btn-add-q" onclick="addQuestion()">+ Добавить вопрос</button>

        <div class="editor-actions">
            <button class="btn-save" onclick="saveTestEdit()">Сохранить</button>
            <a href="index.html" class="btn-cancel">Назад</a>
        </div>

        <div id="editError" class="error-msg hidden"></div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/editor.js"></script>
</body>
</html>
