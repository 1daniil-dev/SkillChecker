<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SkillChecker — Панель преподавателя</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" role="main">
        <h1>SkillChecker</h1>
        <p class="subtitle">Панель преподавателя</p>

        <div class="tabs" role="tablist" aria-label="Разделы панели">
            <button class="tab active" role="tab" aria-selected="true" aria-controls="tab-tests" onclick="showTab('tests')">Тесты</button>
            <button class="tab" role="tab" aria-selected="false" aria-controls="tab-schedule" onclick="showTab('schedule')">Настройки тестов</button>
            <button class="tab" role="tab" aria-selected="false" aria-controls="tab-results" onclick="showTab('results')">Результаты</button>
        </div>

        <div id="tab-tests" class="tab-content" role="tabpanel" aria-label="Управление тестами">
            <div class="section-header">
                <h2>Загруженные тесты</h2>
                <button class="btn-sm" onclick="showUpload()" aria-label="Загрузить новый тест">Загрузить тест</button>
            </div>
            <div id="testsList" role="list" aria-label="Список тестов" aria-live="polite"></div>

            <div id="uploadForm" class="upload-form hidden" role="form" aria-label="Форма загрузки теста">
                <h3>Загрузить новый тест</h3>
                <div class="form-group">
                    <label for="testName">Название теста</label>
                    <input type="text" id="testName" placeholder="Например: oop_exam" aria-label="Название теста">
                </div>
                <div class="form-group">
                    <label for="testFile">JSON-файл</label>
                    <input type="file" id="testFile" accept=".json" aria-label="Выберите JSON файл теста">
                </div>
                <div class="form-row">
                    <button onclick="uploadTest()" aria-label="Загрузить тест на сервер">Загрузить</button>
                    <button class="btn-secondary" onclick="hideUpload()" aria-label="Отменить загрузку">Отмена</button>
                </div>
            </div>
        </div>

        <div id="tab-schedule" class="tab-content hidden" role="tabpanel" aria-label="Настройки тестов">
            <div class="section-header">
                <h2>Настройки тестов</h2>
                <button class="btn-sm" onclick="showScheduleForm()" aria-label="Настроить тест">Настроить тест</button>
            </div>

            <div id="scheduleForm" class="upload-form hidden" role="form" aria-label="Форма настройки теста">
                <h3>Настройка теста</h3>
                <div class="form-group">
                    <label for="scheduleTestSelect">Тест</label>
                    <select id="scheduleTestSelect" aria-label="Выберите тест">
                        <option value="">Выберите тест</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="scheduleTime">Дата и время начала (необязательно)</label>
                    <input type="datetime-local" id="scheduleTime" aria-label="Дата и время начала теста">
                </div>
                <div class="form-group">
                    <label for="timeLimit">Лимит времени (минут, 0 = без лимита)</label>
                    <input type="number" id="timeLimit" min="0" value="0" placeholder="0" aria-label="Лимит времени в минутах">
                </div>
                <div class="form-row">
                    <button onclick="scheduleTest()" aria-label="Сохранить настройки">Сохранить</button>
                    <button class="btn-secondary" onclick="hideScheduleForm()" aria-label="Отменить">Отмена</button>
                </div>
            </div>

            <div id="scheduleList" role="list" aria-label="Список настроек тестов" aria-live="polite"></div>
        </div>

        <div id="tab-results" class="tab-content hidden" role="tabpanel" aria-label="Результаты тестирования">
            <div class="section-header">
                <h2>Результаты тестирования</h2>
                <button class="btn-sm" onclick="loadResults()" aria-label="Обновить список результатов">Обновить</button>
            </div>
            <div id="resultsList" role="list" aria-label="Список результатов" aria-live="polite"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
