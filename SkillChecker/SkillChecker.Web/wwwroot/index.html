<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SkillChecker — Панель преподавателя</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container" role="main">
        <button id="logoutBtn" class="logout-btn" onclick="logout()" aria-label="Выйти">Выйти</button>
        <h1>SkillChecker</h1>
        <p class="subtitle">Панель преподавателя</p>

        <div class="tabs" role="tablist" aria-label="Разделы панели">
            <button class="tab active" role="tab" aria-selected="true" aria-controls="tab-tests" onclick="showTab(event, 'tests')">Тесты</button>
            <button class="tab" role="tab" aria-selected="false" aria-controls="tab-results" onclick="showTab(event, 'results')">Результаты</button>
        </div>

        <div id="tab-tests" class="tab-content" role="tabpanel" aria-label="Управление тестами">
            <div class="section-header">
                <h2>Тесты</h2>
                <button class="btn-sm" onclick="showUpload()" aria-label="Загрузить новый тест">Загрузить тест</button>
            </div>
            <div id="testsList" role="list" aria-label="Список тестов" aria-live="polite"></div>

            <div id="uploadForm" class="upload-form hidden" role="form" aria-label="Форма загрузки теста">
                <h3>Загрузить новый тест</h3>
                <div class="form-group">
                    <label for="testName">Название теста</label>
                    <input type="text" id="testName" placeholder="Например: oop_exam" aria-label="Название теста">
                </div>
                <div class="form-group">
                    <label for="testFile">JSON-файл</label>
                    <input type="file" id="testFile" accept=".json" aria-label="Выберите JSON файл теста">
                </div>
                <div class="form-row">
                    <button onclick="uploadTest()" aria-label="Загрузить тест на сервер">Загрузить</button>
                    <button class="btn-secondary" onclick="hideUpload()" aria-label="Отменить загрузку">Отмена</button>
                </div>
            </div>

            <div id="settingsForm" class="upload-form hidden" role="form" aria-label="Форма настройки теста">
                <h3 id="settingsFormTitle">Настройка теста</h3>
                <div class="form-group">
                    <label for="scheduleTestSelect">Тест</label>
                    <select id="scheduleTestSelect" aria-label="Выберите тест">
                        <option value="">Выберите тест</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="scheduleTime">Дата и время начала (необязательно)</label>
                    <input type="datetime-local" id="scheduleTime" aria-label="Дата и время начала теста">
                </div>
                <div class="form-group">
                    <label for="timeLimit">Лимит времени (минут, 0 = без лимита)</label>
                    <input type="number" id="timeLimit" min="0" value="0" placeholder="0" aria-label="Лимит времени в минутах">
                </div>
                <div class="form-row">
                    <button onclick="saveSettings()" aria-label="Сохранить настройки">Сохранить</button>
                    <button class="btn-secondary" onclick="hideSettingsForm()" aria-label="Отменить">Отмена</button>
                </div>
            </div>
        </div>

        <div id="tab-results" class="tab-content hidden" role="tabpanel" aria-label="Результаты тестирования">
            <div class="section-header">
                <h2>Результаты тестирования</h2>
                <div class="header-actions">
                    <button class="btn-sm btn-export" onclick="openExportModal()" aria-label="Экспорт в Excel">Экспорт в Excel</button>
                    <button class="btn-sm" onclick="loadResults()" aria-label="Обновить список результатов">Обновить</button>
                    <button class="btn-sm btn-danger" onclick="clearResults()" aria-label="Очистить все результаты">Очистить</button>
                </div>
            </div>
            <div id="resultsStats" class="results-stats hidden" role="status" aria-label="Статистика результатов"></div>
            <div id="resultsSort" class="results-sort hidden" role="group" aria-label="Сортировка результатов">
                <span class="results-sort-label">Сортировка:</span>
                <button id="sortByDate" class="sort-btn sort-active" onclick="changeSort('date')" aria-label="Сортировать по времени">Время <span class="sort-arrow">▼</span></button>
                <button id="sortByScore" class="sort-btn" onclick="changeSort('score')" aria-label="Сортировать по результату">Результат <span class="sort-arrow"></span></button>
            </div>
            <div class="search-row"><input type="text" id="searchInput" placeholder="Поиск по ФИО, группе, тесту..." class="search-input"></div>
            <div id="resultsList" role="list" aria-label="Список результатов" aria-live="polite"></div>
        </div>
    </div>

    <div id="exportModal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Экспорт в Excel</h3>
            <p class="modal-hint">Выберите группы для фильтрации:</p>
            <div id="exportGroups" class="export-groups"></div>
            <div class="export-controls">
                <button class="btn-sm" onclick="selectAllExport()">Выделить все</button>
                <button class="btn-sm btn-secondary" onclick="deselectAllExport()">Снять все</button>
                <span id="exportCount" class="export-count"></span>
            </div>
            <div id="exportResults" class="export-results"></div>
            <div class="form-row">
                <button onclick="doExport()">Экспортировать</button>
                <button class="btn-secondary" onclick="closeExportModal()">Отмена</button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/tests.js"></script>
    <script src="js/results.js"></script>
</body>
</html>
