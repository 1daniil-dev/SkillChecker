<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SkillChecker — Панель преподавателя</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>SkillChecker</h1>
        <p class="subtitle">Панель преподавателя</p>

        <div class="tabs">
            <button class="tab active" onclick="showTab('tests')">Тесты</button>
            <button class="tab" onclick="showTab('schedule')">Расписание</button>
            <button class="tab" onclick="showTab('results')">Результаты</button>
        </div>

        <div id="tab-tests" class="tab-content">
            <div class="section-header">
                <h2>Загруженные тесты</h2>
                <button class="btn-sm" onclick="showUpload()">Загрузить тест</button>
            </div>
            <div id="testsList"></div>

            <div id="uploadForm" class="upload-form hidden">
                <h3>Загрузить новый тест</h3>
                <div class="form-group">
                    <label>Название теста</label>
                    <input type="text" id="testName" placeholder="Например: oop_exam">
                </div>
                <div class="form-group">
                    <label>JSON-файл</label>
                    <input type="file" id="testFile" accept=".json">
                </div>
                <div class="form-row">
                    <button onclick="uploadTest()">Загрузить</button>
                    <button class="btn-secondary" onclick="hideUpload()">Отмена</button>
                </div>
            </div>
        </div>

        <div id="tab-schedule" class="tab-content hidden">
            <div class="section-header">
                <h2>Расписание тестов</h2>
                <button class="btn-sm" onclick="showScheduleForm()">Запланировать тест</button>
            </div>

            <div id="scheduleForm" class="upload-form hidden">
                <h3>Запланировать тест</h3>
                <div class="form-group">
                    <label>Тест</label>
                    <select id="scheduleTestSelect">
                        <option value="">Выберите тест</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Дата и время начала</label>
                    <input type="datetime-local" id="scheduleTime">
                </div>
                <div class="form-row">
                    <button onclick="scheduleTest()">Запланировать</button>
                    <button class="btn-secondary" onclick="hideScheduleForm()">Отмена</button>
                </div>
            </div>

            <div id="scheduleList"></div>
        </div>

        <div id="tab-results" class="tab-content hidden">
            <div class="section-header">
                <h2>Результаты тестирования</h2>
                <button class="btn-sm" onclick="loadResults()">Обновить</button>
            </div>
            <div id="resultsList"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
